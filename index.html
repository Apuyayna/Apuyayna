<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Player</title>
    <style>
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000; /* Warna hitam saat video loading */
        }

        video {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            object-fit: cover; /* Video memenuhi layar tanpa merusak rasio */
        }
    </style>
</head>
<body>

    <video autoplay loop muted playsinline>
        <source src="vsn3.mp4" type="video/mp4">
        Browser Anda tidak mendukung tag video.
    </video>

</body>
</html>
